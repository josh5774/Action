/* ─── Toast ─────────────────────────────────────────────────────────── */
function useToast() {
  const [toasts, setToasts] = useState([]);
  const push = (msg) => {
    const id = Date.now();
    setToasts(p => [...p, { id, msg }]);
    setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 3200);
  };
  return { toasts, push };
}

            ))}
          </div>
          <div className="btn-row">
            <button className="btn" onClick={prev}>← Back</button>
            <button className="btn btn-primary" onClick={next}>Continue →</button>
          </div>
        </div>
      )}

      {step === 4 && (
        <div className="card">
          <div className="card-title">Upload your reel &amp; resume</div>
          <div className="card-sub">Show your best work. Files are stored securely and only shared with project posters you apply to.</div>
          <div className="field">
            <label>Demo reel (video)</label>
            <div className={`upload-zone ${form.reelName ? "uploaded" : ""}`} style={{padding:"18px 16px"}} onClick={() => !form.reelName && set("reelName", "demo_reel_2024.mp4")}>
              {form.reelName
                ? (<><div style={{color:"#1a7a4a",fontWeight:500}}>✓ {form.reelName}</div><div className="upload-badge" style={{marginTop:7}}>☁️ AWS S3 — us-east-1</div></>)
                : (<div className="upload-text"><strong>Upload reel</strong> — MP4, MOV — up to 500 MB</div>)
              }
            </div>
          </div>
          <div className="field">
            <label>Resume / CV</label>
            <div className={`upload-zone ${form.resumeName ? "uploaded" : ""}`} style={{padding:"18px 16px"}} onClick={() => !form.resumeName && set("resumeName", "resume_2024.pdf")}>
              {form.resumeName
                ? (<><div style={{color:"#1a7a4a",fontWeight:500}}>✓ {form.resumeName}</div><div className="upload-badge" style={{marginTop:7}}>☁️ AWS S3 — us-east-1</div></>)
                : (<div className="upload-text"><strong>Upload resume</strong> — PDF, DOCX — up to 20 MB</div>)
              }
            </div>
          </div>
          <div className="btn-row">
            <button className="btn" onClick={prev}>← Back</button>
            <button className="btn btn-primary" onClick={next}>Continue →</button>
          </div>
        </div>
      )}

      {step === 5 && (
        <div className="card">
          <div className="card-title">Tell us about yourself</div>
          <div className="card-sub">Your bio and credits appear on your public Action profile and are reviewed by our team.</div>
          <div className="field">
            <label>Bio</label>
            <textarea placeholder="Trained at NYU Tisch, focused on dramatic film and independent productions..." value={form.bio} onChange={e => set("bio", e.target.value)} style={{minHeight:90}} />
          </div>
          <div className="field">
            <label>Notable credits (one per line)</label>
            <textarea placeholder={"The Last Station (short film, 2023)\nEcho (short, 2022)"} value={form.credits} onChange={e => set("credits", e.target.value)} style={{minHeight:70}} />
          </div>
          <div className="field-row">
            <div className="field"><label>IMDb link (optional)</label><input placeholder="imdb.com/name/nm..." value={form.imdb} onChange={e => set("imdb", e.target.value)} /></div>
            <div className="field"><label>Website (optional)</label><input placeholder="yoursite.com" value={form.website} onChange={e => set("website", e.target.value)} /></div>
          </div>
          <div className="btn-row">
            <button className="btn" onClick={prev}>← Back</button>
            <button className="btn btn-primary" onClick={next}>Review →</button>
          </div>
        </div>
      )}

      {step === 6 && (
        <div className="card">
          <div className="card-title">Review &amp; submit</div>
          <div className="card-sub">Everything look right? You can go back to edit any section.</div>
          <div className="review-grid">
            {[
              ["Name", (form.firstName||"Maya")+" "+(form.lastName||"Osei")],
              ["Location", form.city||"Los Angeles, CA"],
              ["Profession", form.profession||"Actor"],
              ["Headshot", form.headshotName ? "✓ Uploaded" : "✗ Missing"],
              ["Demo Reel", form.reelName ? "✓ Uploaded" : "✗ Missing"],
              ["Resume", form.resumeName ? "✓ Uploaded" : "✗ Missing"],
            ].map(([k,v]) => (
              <div key={k} className="review-cell">
                <div className="review-cell-label">{k}</div>
                <div className={`review-cell-val ${v.startsWith("✓")?"ok":v.startsWith("✗")?"miss":""}`}>{v}</div>
              </div>
            ))}
          </div>
          {form.bio && (
            <div style={{background:"#f7f4ef",borderRadius:8,padding:"10px 13px",fontSize:13,color:"#6b6560",marginBottom:14,lineHeight:1.6}}>
              <div className="detail-label">Bio preview</div>
              {form.bio.slice(0,120)}{form.bio.length > 120 ? "…" : ""}
            </div>
          )}
          <div className="terms-note">
            By submitting you agree to Action's Terms of Service and Creator Guidelines. Applications are reviewed by our team within 48 hours. We may request additional materials before a final decision.
          </div>
          <div className="btn-row">
            <button className="btn" onClick={prev}>← Edit</button>
            <button className="btn btn-accent" onClick={() => { onSubmit && onSubmit(); next(); }}>Submit application →</button>
          </div>
        </div>
      )}
    </>
  );
}

/* ─── Admin App Row ─────────────────────────────────────────────────── */
function AppRow({ app, onApprove, onReject, onUndo, onRequestInfo }) {
  const [expanded, setExpanded] = useState(false);
  return (
    <div className={`app-row ${expanded ? "expanded" : ""}`}>
      <div className="app-row-header" onClick={() => setExpanded(e => !e)}>
        <div className="app-avatar" style={{background:app.color,color:app.textColor}}>{app.initials}</div>
        <div>
          <div className="app-name">{app.name}</div>
          <div className="app-meta">{app.profession} · {app.location} · {app.appliedAt}</div>
        </div>
        <div className="app-right">
          <span className={`badge ${app.status}`}>{app.status}</span>
          <button className="expand-toggle">{expanded ? "Close ↑" : "Review ↓"}</button>
        </div>
      </div>
      {expanded && (
        <div className="app-detail">
          <div className="detail-cols">
            <div><div className="detail-label">Bio</div><div className="detail-val">{app.bio}</div></div>
            <div><div className="detail-label">Credits</div><div className="detail-val">{app.credits}</div></div>
          </div>
          <div className="detail-label" style={{marginBottom:8}}>Uploaded files</div>
          <div className="file-row"><span>🎬</span><span>{app.reelFile}</span><span className="file-storage-badge">AWS S3</span></div>
          <div className="file-row"><span>📄</span><span>{app.resumeFile}</span><span className="file-storage-badge">AWS S3</span></div>
          <div className="file-row"><span>🖼️</span><span>{app.headshotFile}</span><span className="file-storage-badge">Cloudflare R2</span></div>
          {app.status === "pending" ? (
            <div className="action-strip">
              <button className="btn btn-accent" onClick={() => onApprove(app.id)}>✓ Approve</button>
              <button className="btn btn-danger" onClick={() => onReject(app.id)}>✗ Reject</button>
              <button className="btn btn-ghost" onClick={() => onRequestInfo(app.id)}>Request more info</button>
            </div>
          ) : (
            <div className="undo-text">
              This application was <strong>{app.status}</strong>.{" "}
              <button className="undo-link" onClick={() => onUndo(app.id)}>Undo</button>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

/* ─── Admin Dashboard ───────────────────────────────────────────────── */
function AdminDashboard({ push }) {
  const [apps, setApps] = useState(SEED_APPS);
  const [filter, setFilter] = useState("pending");
  const [search, setSearch] = useState("");
  const [modal, setModal] = useState(null);

  const counts = {
    all: apps.length,
    pending: apps.filter(a => a.status === "pending").length,
    approved: apps.filter(a => a.status === "approved").length,
    rejected: apps.filter(a => a.status === "rejected").length,
  };

  const filtered = apps
    .filter(a => filter === "all" || a.status === filter)
    .filter(a => !search || a.name.toLowerCase().includes(search.toLowerCase()) || a.profession.toLowerCase().includes(search.toLowerCase()));

  const setStatus = (id, status) => setApps(prev => prev.map(a => a.id === id ? {...a, status} : a));

  const confirmAction = () => {
    const app = apps.find(a => a.id === modal.id);
    setStatus(modal.id, modal.action);
    setModal(null);
    if (modal.action === "approved") push(`✓ ${app.name} approved — welcome email sent`);
    else push(`${app.name}'s application rejected`);
  };

  return (
    <div className="admin-wrap">
      <div className="admin-head">
        <div className="admin-title">Creator Applications</div>
        <div className="admin-date">{new Date().toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"})}</div>
      </div>

      <div className="stat-row">
        {[["Total","",counts.all],["Pending","s-pending",counts.pending],["Approved","s-approved",counts.approved],["Rejected","s-rejected",counts.rejected]].map(([label,cls,val]) => (
          <div key={label} className={`stat-tile ${cls}`}>
            <div className="stat-tile-label">{label}</div>
            <div className="stat-tile-val">{val}</div>
          </div>
        ))}
      </div>

      <div className="filter-bar">
        {["all","pending","approved","rejected"].map(f => (
          <button key={f} className={`filter-pill ${filter===f?"active":""}`} onClick={() => setFilter(f)}>
            {f.charAt(0).toUpperCase()+f.slice(1)} {f!=="all"&&<span style={{opacity:.7}}>({counts[f]})</span>}
          </button>
        ))}
        <input className="filter-search" placeholder="Search by name or role..." value={search} onChange={e => setSearch(e.target.value)} />
      </div>

      <div className="app-list">
        {filtered.length === 0
          ? <div className="empty-state">No applications match this filter.</div>
          : filtered.map(app => (
            <AppRow
              key={app.id} app={app}
              onApprove={id => setModal({id, action:"approved"})}
              onReject={id => setModal({id, action:"rejected"})}
              onUndo={id => { setStatus(id,"pending"); push("Application moved back to pending"); }}
              onRequestInfo={id => { const a=apps.find(x=>x.id===id); push(`📧 Info request sent to ${a.name}`); }}
            />
          ))
        }
      </div>

      {modal && (() => {
        const app = apps.find(a => a.id === modal.id);
        const isApprove = modal.action === "approved";
        return (
          <div className="modal-overlay" onClick={() => setModal(null)}>
            <div className="modal-box" onClick={e => e.stopPropagation()}>
              <div className="modal-title">{isApprove ? "Approve" : "Reject"} {app.name}?</div>
              <div className="modal-body">
                {isApprove
                  ? `${app.name} will receive a welcome email and gain full creator access to Action — project applications, mixers, and their public profile.`
                  : `${app.name}'s application will be declined. They'll be notified and can reapply after 30 days.`
                }
              </div>
              <div className="modal-btns">
                <button className="btn btn-ghost" onClick={() => setModal(null)}>Cancel</button>
                <button className={`btn ${isApprove?"btn-accent":"btn-danger"}`} onClick={confirmAction}>
                  {isApprove ? "Yes, approve" : "Yes, reject"}
                </button>
              </div>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

/* ─── Root ──────────────────────────────────────────────────────────── */
function App() {
  const [view, setView] = useState("apply");
  const { toasts, push } = useToast();

  return (
    <>
      <GlobalStyle />
      <nav className="fl-nav">
        <div className="fl-logo">Film<em>Link</em></div>
        <div className="fl-nav-tabs">
          <button className={`fl-nav-tab ${view==="apply"?"active":""}`} onClick={() => setView("apply")}>Creator application</button>
          <button className={`fl-nav-tab ${view==="admin"?"active":""}`} onClick={() => setView("admin")}>Admin dashboard</button>
        </div>
      </nav>

      {view === "apply" && (
        <div className="apply-wrap">
          <ApplicationFlow onSubmit={() => push("Application submitted — we'll review within 48 hours ✓")} />
        </div>
      )}
      {view === "admin" && <AdminDashboard push={push} />}

      <div className="toast-wrap">
        {toasts.map(t => <div key={t.id} className="toast-item">{t.msg}</div>)}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
